<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locadora - Filmes</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Locadora</h1>
<button onclick="abrirModal()">+ Novo Filme</button>
</header>

<main>

<label>Filtrar por gênero:</label>
<select id="filtroGenero" onchange="filtrarGenero()">
<option value="todos">Todos</option>
<option value="Ação">Ação</option>
<option value="Comédia">Comédia</option>
<option value="Terror">Terror</option>
<option value="Drama">Drama</option>
<option value="Ficção">Ficção</option>
</select>

<table>

<thead>
<tr>
<th>Imagem</th>
<th>Título</th>
<th>Gênero</th>
<th>Ano</th>
<th>Descrição</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="dados"></tbody>

</table>

</main>


<div id="modalCli" class="modal">

<form id="formCli" class="modal-content">

<h2>Novo Filme</h2>

<input type="text" name="imagem" placeholder="URL da imagem do filme">
<input type="text" name="titulo" placeholder="Título" required>

<select name="genero" required>
<option value="">Selecione o gênero</option>
<option value="Ação">Ação</option>
<option value="Comédia">Comédia</option>
<option value="Terror">Terror</option>
<option value="Drama">Drama</option>
<option value="Ficção">Ficção</option>
</select>

<input type="number" name="ano" placeholder="Ano" required>

<textarea name="produtora" placeholder="Descrição" rows="3" required></textarea>

<div class="modal-buttons">
<button type="submit">Salvar</button>
<button type="reset" onclick="fecharModal()">Cancelar</button>
</div>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
